server {
  listen 80;
  server_name _;
  charset utf-8;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /hub {
    return 301 /hub/;
  }

  location /hub/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /hub/index.html;
  }

  location = /public {
    return 301 /;
  }

  location /public/ {
    rewrite ^/public/(.*)$ /$1 break;
    proxy_pass http://users:80;
  }

  location = /docs {
    return 301 /docs/;
  }

  location /docs/ {
    proxy_pass http://repo-browser:80/Siselo-DOC/;
  }

  location = /users-repo {
    return 301 /users-repo/;
  }

  location /users-repo/ {
    proxy_pass http://repo-browser:80/Siselo-Users/;
  }

  location = /admin-site {
    return 301 /admin-site/;
  }

  location /admin-site/ {
    proxy_pass http://repo-browser:80/Siselo-Admin/;
  }

  location = /frontend-site {
    return 301 /frontend-site/;
  }

  location /frontend-site/ {
    proxy_pass http://repo-browser:80/Siselo-Frontend/;
  }

  location = /repos {
    return 301 /repos/;
  }

  location /repos/ {
    proxy_pass http://repo-browser:80/;
  }

  location / {
    proxy_pass http://users:80;
  }
}
