name: siselo-homolog

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: intranet_cadh
    volumes:
      - db_data:/var/lib/mysql
      - ../Siselo-Users/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
      - ../Siselo-Users/database_patch_003.sql:/docker-entrypoint-initdb.d/03-database_patch_003.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  db-migrate:
    image: mysql:8.0
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../Siselo-Users/database_patch_003.sql:/migrations/database_patch_003.sql:ro
    entrypoint:
      - sh
      - -c
      - mysql -h db -uroot -prootpassword intranet_cadh < /migrations/database_patch_003.sql

  users:
    build: ../Siselo-Users
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: intranet_cadh
    expose:
      - "80"

  repo-browser:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ..:/usr/share/nginx/html:ro
      - ./nginx/repo-browser.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - users
      - repo-browser
    ports:
      - "${SISELO_PORT:-8080}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway:/usr/share/nginx/html:ro

volumes:
  db_data:
